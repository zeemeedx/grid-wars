<!DOCTYPE html>
<html>

<head>
    <title>GridWars</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <script type="module">
        import { createApp, ref } from 'https://unpkg.com/vue@3/dist/vue.esm-browser.js'

        createApp({
            setup() {
                const grade = ref(Array(100).fill(false))

                const alternarCelula = (index) => {
                    grade.value[index] = !grade.value[index]
                }

                const iniciarDrag = (e) => { e.dataTransfer.setData('acao', 'ativar') }
                const soltar = (index) => { grade.value[index] = true }

                return {
                    grade,
                    alternarCelula,
                    iniciarDrag,
                    soltar
                }
            }
        }).mount('#app')
    </script>

    <div id="app">
        <div class="inventory">
            <div class="item-drag" draggable="true" @dragstart="iniciarDrag">Arraste</div>
        </div>

        <div class="grid">
            <div v-for="(ativo, index) in grade" :key="index"
                 class="cell" :class="{ active: ativo }"
                 @click="alternarCelula(index)"
                 @dragover.prevent
                 @drop="soltar(index)">
            </div>
        </div>
    </div>
</body>

</html>
