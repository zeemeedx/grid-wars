version: '3.8'

services:
  api:
    build: ./backend
    container_name: gridwars_api
    ports:
      - "8000:8000"
    volumes:
      - "./backend:/app"
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: gridwars_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gridwars
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  frontend:
    image: nginx:alpine
    container_name: gridwars_frontend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    ports:
      - "8080:80"

volumes:
  db_data:     